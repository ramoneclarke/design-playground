  <style>
    /* Phone frame */
    .phone-frame {
      width: 390px;
      height: 844px;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
      position: relative;
      flex-shrink: 0;
      transform: scale(0.7);
      transform-origin: top left;
      margin-right: calc(-390px * 0.3);
      margin-bottom: calc(-844px * 0.3);
    }
    .phone-frame::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 28px;
      background: #000;
      border-radius: 0 0 16px 16px;
      z-index: 50;
    }
    .phone-screen {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      position: relative;
    }
    .phone-screen::-webkit-scrollbar { display: none; }
    .phone-screen { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-neutral-950 min-h-screen text-white font-sans">
